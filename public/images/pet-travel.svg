<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 72" fill="none" aria-hidden="true">
  <!-- Side-facing dog, slight forward lean, mid-stride legs; flat fills, brand colors -->
  <g transform="rotate(5 56 38)">
    <ellipse cx="44" cy="40" rx="30" ry="19" fill="#FFB84D" />
    <ellipse cx="78" cy="32" rx="17" ry="15" fill="#FFB84D" />
    <ellipse cx="92" cy="24" rx="9" ry="7" fill="#3399FF" />
    <ellipse cx="98" cy="30" rx="10" ry="8" fill="#FFB84D" />
    <circle cx="90" cy="28" r="2.8" fill="#1e293b" />
    <ellipse cx="102" cy="32" rx="5" ry="4" fill="#1e293b" />
    <ellipse cx="100" cy="34" rx="3" ry="2.5" fill="#E8A088" />
    <!-- front legs: near extended forward, far tucked -->
    <rect x="54" y="44" width="10" height="18" rx="5" fill="#FFB84D" transform="rotate(-22 59 53)" />
    <rect x="40" y="48" width="9" height="14" rx="4.5" fill="#FFB84D" transform="rotate(18 44.5 55)" />
    <!-- back legs: driving push vs short stride -->
    <rect x="22" y="42" width="10" height="20" rx="5" fill="#FFB84D" transform="rotate(28 27 52)" />
    <rect x="10" y="46" width="9" height="15" rx="4.5" fill="#FFB84D" transform="rotate(-12 14.5 53.5)" />
    <path
      d="M6 34 C2 26 4 18 12 16 C16 22 14 30 10 36 Z"
      fill="#FFB84D"
    />
  </g>
</svg>
